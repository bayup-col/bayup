services:
  - type: web
    name: bayup-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 10000 --workers 2
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Aquí pondrás la URL de Supabase en el dashboard de Render
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
