services:
  - type: web
    name: bayup-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: bayup-db
          property: connectionString

databases:
  - name: bayup-db
    databaseName: bayup
    user: bayup_user
    plan: free # Plan gratuito de PostgreSQL en Render
